<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YÖK Araştırma Üniversiteleri — Heatmap 2020–2024</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;min-height:auto;display:flex;align-items:center;justify-content:center;padding:24px;font-family:'Open Sans',sans-serif}
#wrap{background:#fff;padding:28px 26px 20px;border:1px solid #cddde8;border-radius:10px;width:100%;max-width:980px;box-shadow:0 4px 24px rgba(0,40,80,0.08)}

/* header */
#head{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
#ttl{font-size:17px;font-weight:700;color:#1a3a52;letter-spacing:-0.2px;line-height:1.3}
#sub{font-size:10.5px;color:#8ab0c8;margin-top:3px}
#src{font-size:9.5px;color:#8ab0c8;text-align:right;line-height:1.7}

/* mode toggle */
#modes{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
#modes span{font-size:10.5px;color:#8ab0c8;margin-right:4px}
.mbtn{padding:5px 12px;border:1px solid #cddde8;border-radius:20px;background:#f8fbfd;cursor:pointer;font-size:10.5px;color:#5a8aa8;font-family:'Open Sans',sans-serif;transition:all .15s}
.mbtn:hover{border-color:#3a7ab8;color:#3a7ab8}
.mbtn.on{background:#3a7ab8;border-color:#3a7ab8;color:#fff;font-weight:600}

/* chart */
#chartbox{position:relative;overflow-x:auto}
svg#hv{display:block}

/* tooltip */
#tt{position:fixed;background:#fff;border:1px solid #b8d4e8;border-radius:8px;padding:10px 14px;
  font-size:11.5px;line-height:1.85;pointer-events:none;display:none;z-index:999;
  color:#3a6070;min-width:200px;box-shadow:0 4px 16px rgba(0,50,90,0.12)}
#tt strong{color:#1a3a52;font-size:12.5px;display:block;margin-bottom:2px}
#tt .tc{font-size:9px;color:#8ab0c8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.tr{display:flex;justify-content:space-between;gap:16px}
.tv{font-weight:700;color:#1a6aaa}
.tvg{font-weight:700;color:#20a870}
.tvr{font-weight:700;color:#e85a28}

/* colour legend */
#clegend{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
#clegend span{font-size:10px;color:#8ab0c8}
#cbar{width:180px;height:10px;border-radius:5px}

/* sort / highlight controls */
#sortbox{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
#sortbox label{font-size:10.5px;color:#8ab0c8}
select{font-size:10.5px;color:#3a5a70;border:1px solid #cddde8;border-radius:6px;padding:3px 8px;background:#f8fbfd;font-family:'Open Sans',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div id="wrap">
  <div id="head">
    <div>
      <div id="ttl">YÖK Araştırma Üniversiteleri — Performans Isı Haritası</div>
      <div id="sub">Tüm üniversiteler × tüm yıllar · Hücre rengi = toplam performans puanı</div>
    </div>
    <div id="src">YÖK Araştırma Üniversitesi<br>Performans İzleme Endeksi<br>2020 – 2024</div>
  </div>

  <div id="modes">
    <span>Göster:</span>
    <button class="mbtn on" onclick="setMode('total')">Toplam Puan</button>
    <button class="mbtn"    onclick="setMode('cap')">Kapasite</button>
    <button class="mbtn"    onclick="setMode('kal')">Kalite</button>
    <button class="mbtn"    onclick="setMode('isb')">İşbirliği</button>
    <button class="mbtn"    onclick="setMode('delta')">Δ Değişim</button>
  </div>

  <div id="sortbox">
    <label>Sırala:</label>
    <select onchange="setSort(this.value)">
      <option value="2024">2024 puanına göre ↓</option>
      <option value="2020">2020 puanına göre ↓</option>
      <option value="delta">En çok artış</option>
      <option value="cat">Kategori</option>
      <option value="alpha">İsim (A–Z)</option>
    </select>
  </div>

  <div id="chartbox">
    <svg id="hv" role="img" aria-label="YÖK araştırma üniversiteleri ısı haritası"></svg>
  </div>

  <div id="clegend">
    <span id="cmin">düşük</span>
    <canvas id="cbar" width="180" height="10"></canvas>
    <span id="cmax">yüksek</span>
    <span style="margin-left:16px;font-size:10px;color:#bbb">◻ = veri yok</span>
    <span style="margin-left:8px;font-size:10px;color:#e85a28;font-weight:700">ERÜ vurgulu</span>
  </div>
</div>
<div id="tt"></div>

<script>
const NS='http://www.w3.org/2000/svg';
const YEARS=[2020,2021,2022,2023,2024];

/* ── EXACT DATA FROM EXCEL ──
   [cap, kal, isb]  or  null
*/
const DATA={
  'ODTÜ':  {s:'ODTÜ',     cat:'A1',yr:{2020:[21.39,35.86,28.15],2021:[32.57,36.54,16.76],2022:[33.87,30.62,17.78],2023:[31,27,15],  2024:[30.29,26.91,16.12]}},
  'İTÜ':   {s:'İTÜ',      cat:'A1',yr:{2020:[19.78,32.83,23.62],2021:[27.75,27.18,13.70],2022:[31.04,28.29,14.80],2023:[31,30,11],  2024:[28.96,27.53,12.51]}},
  'BOÜN':  {s:'Boğaziçi', cat:'A1',yr:{2020:[14.59,27.50,28.24],2021:[21.29,28.82,13.14],2022:[20.87,28.62,12.44],2023:[24,33,14],  2024:[27.19,25.88,14.60]}},
  'KÜ':    {s:'Koç',      cat:'A1',yr:{2020:null,                2021:[19.97,34.63,15.45],2022:[26.18,32.00,17.63],2023:[27,33,14],  2024:[31.61,28.94,13.81]}},
  'SÜ':    {s:'Sabancı',  cat:'A1',yr:{2020:null,                2021:[15.59,37.15,16.29],2022:[22.33,34.74,17.42],2023:[24,33,16],  2024:[31.85,27.25,14.84]}},
  'Bilkent':{s:'Bilkent', cat:'A1',yr:{2020:null,                2021:[23.93,27.61,14.79],2022:[24.89,28.36,14.60],2023:[23,29,12],  2024:[25.79,26.46,12.31]}},
  'İYTE':  {s:'İYTE',     cat:'A2',yr:{2020:[15.98,24.95,19.94],2021:[25.61,19.14,13.19],2022:[25.23,19.64,14.40],2023:[25,22,13],  2024:[29.73,19.91,13.40]}},
  'YTÜ':   {s:'YTÜ',      cat:'A2',yr:{2020:[16.20,23.33,14.58],2021:[23.45,18.06,9.36], 2022:[25.38,19.58,11.64],2023:[27,25,10],  2024:[29.08,23.69,11.99]}},
  'AÜ':    {s:'Ankara',   cat:'A2',yr:{2020:[13.29,20.52,19.26],2021:[17.60,18.10,9.47], 2022:[20.10,17.31,10.87],2023:[26,19,12],  2024:[24.37,24.80,11.85]}},
  'İÜ':    {s:'İÜ',       cat:'A2',yr:{2020:[15.03,16.29,18.74],2021:[21.54,23.70,9.48], 2022:[24.42,21.51,7.86], 2023:[24,19,9],   2024:[23.23,25.07,11.31]}},
  'ERÜ':   {s:'ERÜ',      cat:'ERU',yr:{2020:[9.00,20.57,19.09],2021:[15.45,21.36,8.04], 2022:[17.79,22.33,9.49], 2023:[22,21,10],  2024:[24.03,23.15,11.54]}},
  'HÜ':    {s:'Hacettepe',cat:'A2',yr:{2020:[15.89,20.91,11.69],2021:[21.04,22.59,6.63], 2022:[23.83,19.14,7.71], 2023:[24,23,7],   2024:[25.89,26.02,11.20]}},
  'GTÜ':   {s:'GTÜ',      cat:'A2',yr:{2020:[13.98,16.05,14.03],2021:[20.35,19.69,10.10],2022:[17.40,19.06,12.27],2023:[18,16,11],  2024:[23.24,19.52,11.94]}},
  'EÜ':    {s:'Ege',      cat:'A2',yr:{2020:[14.58,14.94,9.32], 2021:[20.76,14.42,9.88], 2022:[20.96,11.92,8.95], 2023:[25,15,10],  2024:[25.19,23.02,11.08]}},
  'İÜC':   {s:'İÜC',      cat:'A2',yr:{2020:[11.81,5.63,19.91], 2021:[20.88,13.53,9.06], 2022:[22.32,12.24,9.25], 2023:[24,14,10],  2024:[24.56,22.38,10.38]}},
  'GÜ':    {s:'Gazi',     cat:'A2',yr:{2020:[11.40,10.49,6.07], 2021:[19.88,15.06,6.12], 2022:[20.61,11.76,7.70], 2023:[25,14,7],   2024:[25.05,23.44,10.71]}},
  'ATAÜNİ':{s:'Atatürk',  cat:'A2',yr:{2020:[4.27,14.94,8.82],  2021:[12.55,13.68,4.32], 2022:[14.78,19.76,4.46], 2023:[17,21,6],   2024:[22.51,24.62,11.00]}},
  'SAÜ':   {s:'Sakarya',  cat:'A2',yr:{2020:null,2021:null,2022:null,2023:null,           2024:[20.89,26.36,11.02]}},
  'MÜ':    {s:'Marmara',  cat:'A3',yr:{2020:[7.13,11.10,14.50], 2021:[11.42,13.35,8.26], 2022:[13.95,11.38,9.11], 2023:[16,16,10],  2024:[21.10,22.71,11.20]}},
  'BUÜ':   {s:'BUÜ',      cat:'A3',yr:{2020:[5.42,13.09,13.76], 2021:[7.66,10.01,8.53],  2022:[7.86,10.23,9.90],  2023:[12,11,8],   2024:[20.79,19.61,10.80]}},
  'DEÜ':   {s:'DEÜ',      cat:'A3',yr:{2020:[7.22,9.77,11.82],  2021:[11.98,14.11,6.00], 2022:[12.73,11.08,7.74], 2023:[20,9,6],    2024:null}},
  'ÇÜ':    {s:'Çukurova', cat:'A3',yr:{2020:[6.24,9.91,11.49],  2021:[13.91,9.47,5.41],  2022:[14.22,11.46,7.22], 2023:[17,13,8],   2024:[21.86,21.83,10.38]}},
  'FÜ':    {s:'Fırat',    cat:'A3',yr:{2020:[1.87,12.21,9.10],  2021:[10.08,20.37,6.28], 2022:[13.66,19.32,5.55], 2023:[17,16,5],   2024:[21.97,21.27,9.99]}},
  'KTÜ':   {s:'KTÜ',      cat:'A3',yr:{2020:[3.99,9.09,7.15],   2021:[11.62,12.11,4.82], 2022:[11.96,12.46,4.44], 2023:[15,10,5],   2024:[21.65,20.58,10.06]}},
};

const FULLNAMES={
  'ODTÜ':'Orta Doğu Teknik Üniversitesi','İTÜ':'İstanbul Teknik Üniversitesi',
  'BOÜN':'Boğaziçi Üniversitesi','KÜ':'Koç Üniversitesi','SÜ':'Sabancı Üniversitesi',
  'Bilkent':'İhsan Doğramacı Bilkent Üniversitesi','İYTE':'İzmir Yüksek Teknoloji Enstitüsü',
  'YTÜ':'Yıldız Teknik Üniversitesi','AÜ':'Ankara Üniversitesi','İÜ':'İstanbul Üniversitesi',
  'ERÜ':'Erciyes Üniversitesi','HÜ':'Hacettepe Üniversitesi','GTÜ':'Gebze Teknik Üniversitesi',
  'EÜ':'Ege Üniversitesi','İÜC':'İstanbul Üniversitesi-Cerrahpaşa','GÜ':'Gazi Üniversitesi',
  'ATAÜNİ':'Atatürk Üniversitesi','SAÜ':'Sakarya Üniversitesi','MÜ':'Marmara Üniversitesi',
  'BUÜ':'Bursa Uludağ Üniversitesi','DEÜ':'Dokuz Eylül Üniversitesi',
  'ÇÜ':'Çukurova Üniversitesi','FÜ':'Fırat Üniversitesi','KTÜ':'Karadeniz Teknik Üniversitesi',
};

const CAT_ORDER={'A1':0,'ERU':1,'A2':2,'A3':3};
const CAT_LABEL={'A1':'A1','ERU':'A2','A2':'A2','A3':'A3'};
const CAT_COL={'A1':'#2a6fc4','ERU':'#e85a28','A2':'#20a870','A3':'#e0a018'};

let curMode='total', curSort='2024';

function getVal(uid,yr,mode){
  const d=DATA[uid]; if(!d)return null;
  const v=d.yr[yr]; if(!v)return null;
  if(mode==='total') return v[0]+v[1]+v[2];
  if(mode==='cap')   return v[0];
  if(mode==='kal')   return v[1];
  if(mode==='isb')   return v[2];
  if(mode==='delta'){
    // change from first available year to this year
    const first=YEARS.find(y=>DATA[uid].yr[y]!==null);
    if(!first||yr===first) return 0;
    const vf=DATA[uid].yr[first]; if(!vf) return null;
    const tf=vf[0]+vf[1]+vf[2];
    const tc=v[0]+v[1]+v[2];
    return tc-tf;
  }
  return null;
}

/* compute global min/max for colour scale */
function getExtent(mode){
  const vals=[];
  Object.keys(DATA).forEach(uid=>{
    YEARS.forEach(yr=>{
      const v=getVal(uid,yr,mode);
      if(v!==null) vals.push(v);
    });
  });
  return [Math.min(...vals),Math.max(...vals)];
}

/* colour scales */
function colourTotal(t){
  // white → teal → dark blue
  const stops=[
    [248,252,255],[214,234,248],[130,194,220],[42,111,196],[10,42,96]
  ];
  t=Math.max(0,Math.min(1,t));
  const si=Math.min(Math.floor(t*(stops.length-1)),stops.length-2);
  const sf=(t*(stops.length-1))-si;
  const a=stops[si],b=stops[si+1];
  return `rgb(${Math.round(a[0]+(b[0]-a[0])*sf)},${Math.round(a[1]+(b[1]-a[1])*sf)},${Math.round(a[2]+(b[2]-a[2])*sf)})`;
}
function colourDelta(t){
  // red(−) → white(0) → green(+)   t in [0,1], 0.5=neutral
  if(t<0.5){
    const u=t/0.5;
    return `rgb(${Math.round(232-(232-255)*u)},${Math.round(90+(255-90)*u)},${Math.round(40+(255-40)*u)})`;
  } else {
    const u=(t-0.5)/0.5;
    return `rgb(${Math.round(255-(255-32)*u)},${Math.round(255-(255-168)*u)},${Math.round(255-(255-112)*u)})`;
  }
}
function getColour(val,mn,mx,mode){
  if(val===null) return null;
  if(mode==='delta'){
    const t=(val-mn)/(mx-mn||1);
    return colourDelta(t);
  }
  return colourTotal((val-mn)/(mx-mn||1));
}

/* text colour based on bg brightness */
function textOnBg(hexOrRgb){
  const m=hexOrRgb.match(/\d+/g).map(Number);
  const lum=0.299*m[0]+0.587*m[1]+0.114*m[2];
  return lum>155?'#1a3a52':'rgba(255,255,255,0.92)';
}

function mk(tag,a={}){const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;}

/* sort universities */
function sortedUnis(){
  const uids=Object.keys(DATA);
  if(curSort==='cat'){
    return uids.sort((a,b)=>{
      const ca=CAT_ORDER[DATA[a].cat]??9, cb=CAT_ORDER[DATA[b].cat]??9;
      if(ca!==cb)return ca-cb;
      const sa=getVal(a,2024,'total')??0, sb=getVal(b,2024,'total')??0;
      return sb-sa;
    });
  }
  if(curSort==='alpha') return uids.sort((a,b)=>DATA[a].s.localeCompare(DATA[b].s,'tr'));
  if(curSort==='delta'){
    return uids.sort((a,b)=>{
      const da=getVal(a,2024,'total')??0-(getVal(a,2020,'total')??getVal(a,2021,'total')??0);
      const db=getVal(b,2024,'total')??0-(getVal(b,2020,'total')??getVal(b,2021,'total')??0);
      return db-da;
    });
  }
  // sort by specific year
  const yr=parseInt(curSort)||2024;
  return uids.sort((a,b)=>{
    const sa=getVal(a,yr,'total')??-999;
    const sb=getVal(b,yr,'total')??-999;
    return sb-sa;
  });
}

function draw(){
  const svg=document.getElementById('hv');
  svg.innerHTML='';

  const uids=sortedUnis();
  const nU=uids.length, nY=YEARS.length;

  /* layout */
  const CELL_H=34, CELL_W=70;
  const PAD_L=110, PAD_T=44, PAD_B=20, PAD_R=12;
  const W2=PAD_L+nY*CELL_W+PAD_R;
  const H2=PAD_T+nU*CELL_H+PAD_B;
  svg.setAttribute('viewBox',`0 0 ${W2} ${H2}`);
  svg.setAttribute('width',W2);
  svg.setAttribute('height',H2);
  svg.style.minWidth=W2+'px';

  const [mn,mx]=getExtent(curMode);

  /* column headers (years) */
  YEARS.forEach((yr,yi)=>{
    const x=PAD_L+yi*CELL_W+CELL_W/2;
    const t=mk('text',{x,y:PAD_T-10,'text-anchor':'middle',
      'font-size':'12','font-weight':'700','font-family':"'Open Sans',sans-serif",fill:'#1a3a52'});
    t.textContent=yr; svg.appendChild(t);
  });

  /* mode label */
  const ml=mk('text',{x:PAD_L/2,y:PAD_T-10,'text-anchor':'middle',
    'font-size':'9','font-family':"'Open Sans',sans-serif",fill:'#8ab0c8','font-weight':'600'});
  const modeLabel={total:'Toplam',cap:'Kapasite',kal:'Kalite',isb:'İşbirliği',delta:'Δ Değişim'};
  ml.textContent=modeLabel[curMode]||''; svg.appendChild(ml);

  /* rows */
  uids.forEach((uid,ri)=>{
    const d=DATA[uid];
    const isEru=(uid==='ERÜ');
    const y0=PAD_T+ri*CELL_H;
    const catCol=CAT_COL[d.cat]||'#888';

    /* category stripe */
    const stripe=mk('rect',{x:0,y:y0,width:4,height:CELL_H,fill:catCol});
    svg.appendChild(stripe);

    /* row label */
    const rl=mk('text',{x:PAD_L-10,y:y0+CELL_H/2,
      'text-anchor':'end','dominant-baseline':'middle',
      'font-size':isEru?11.5:10,'font-weight':isEru?'700':'400',
      'font-family':"'Open Sans',sans-serif",
      fill:isEru?'#e85a28':catCol});
    rl.textContent=d.s; svg.appendChild(rl);

    /* ERÜ row highlight bg */
    if(isEru){
      svg.appendChild(mk('rect',{x:PAD_L,y:y0,width:nY*CELL_W,height:CELL_H,
        fill:'rgba(232,90,40,0.04)',rx:0}));
    }

    /* cells */
    YEARS.forEach((yr,yi)=>{
      const val=getVal(uid,yr,curMode);
      const bgCol=getColour(val,mn,mx,curMode);
      const cx=PAD_L+yi*CELL_W;

      /* cell bg */
      const rect=mk('rect',{x:cx+1,y:y0+1,width:CELL_W-2,height:CELL_H-2,
        rx:3,fill:bgCol||'#f8f8f8',
        stroke:isEru?'rgba(232,90,40,0.35)':'rgba(200,220,235,0.5)',
        'stroke-width':isEru?'1.5':'0.5'});
      svg.appendChild(rect);

      /* cell value */
      if(val!==null){
        const tc=textOnBg(bgCol);
        const vt=mk('text',{x:cx+CELL_W/2,y:y0+CELL_H/2-3,
          'text-anchor':'middle','dominant-baseline':'middle',
          'font-size':'10','font-weight':isEru?'700':'600',
          'font-family':"'Open Sans',sans-serif",fill:tc});
        vt.textContent=(curMode==='delta'&&val>0?'+':'')+val.toFixed(1);
        svg.appendChild(vt);

        /* sub-scores (cap/kal/isb) as tiny text */
        if(curMode==='total'||curMode==='delta'){
          const raw=d.yr[yr];
          if(raw){
            const st=mk('text',{x:cx+CELL_W/2,y:y0+CELL_H/2+9,
              'text-anchor':'middle','dominant-baseline':'middle',
              'font-size':'7.5','font-family':"'Open Sans',sans-serif",
              fill:tc,opacity:'0.7'});
            st.textContent=`${raw[0].toFixed(0)}·${raw[1].toFixed(0)}·${raw[2].toFixed(0)}`;
            svg.appendChild(st);
          }
        }
      } else {
        /* no data marker */
        const nd=mk('text',{x:cx+CELL_W/2,y:y0+CELL_H/2,
          'text-anchor':'middle','dominant-baseline':'middle',
          'font-size':'11','font-family':"'Open Sans',sans-serif",fill:'#ddd'});
        nd.textContent='—'; svg.appendChild(nd);
      }

      /* hover overlay */
      const hover=mk('rect',{x:cx+1,y:y0+1,width:CELL_W-2,height:CELL_H-2,
        rx:3,fill:'transparent',style:'cursor:pointer'});
      hover.addEventListener('mouseenter',ev=>showTip(ev,uid,yr,val,d));
      hover.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none';});
      hover.addEventListener('mousemove',ev=>showTip(ev,uid,yr,val,d));
      svg.appendChild(hover);
    });

    /* row divider */
    if(ri<nU-1){
      svg.appendChild(mk('line',{
        x1:0,x2:W2,y1:y0+CELL_H,y2:y0+CELL_H,
        stroke:'rgba(210,232,244,0.7)','stroke-width':'0.8'}));
    }
  });

  /* update colour bar */
  drawColorBar(mn,mx);
  document.getElementById('cmin').textContent=mn.toFixed(1);
  document.getElementById('cmax').textContent=mx.toFixed(1);
}

function showTip(ev,uid,yr,val,d){
  const tip=document.getElementById('tt');
  const full=FULLNAMES[uid]||d.s;
  const raw=d.yr[yr];
  const total=raw?raw.reduce((a,b)=>a+b,0):null;
  const delta=(() => {
    const first=YEARS.find(y=>DATA[uid].yr[y]!==null);
    if(!first||!raw)return null;
    const vf=DATA[uid].yr[first]; if(!vf)return null;
    return (raw[0]+raw[1]+raw[2])-(vf[0]+vf[1]+vf[2]);
  })();
  const vc=delta>=0?'tvg':'tvr';

  tip.innerHTML=`<strong>${full}</strong>
    <span class="tc">${CAT_LABEL[d.cat]||d.cat} kategorisi · ${yr}</span>
    ${raw?`
    <div class="tr"><span>Araştırma Kapasitesi</span><span class="tv">${raw[0].toFixed(2)}</span></div>
    <div class="tr"><span>Araştırma Kalitesi</span><span class="tv">${raw[1].toFixed(2)}</span></div>
    <div class="tr"><span>Araştırma İşbirliği</span><span class="tv">${raw[2].toFixed(2)}</span></div>
    <div class="tr" style="border-top:1px solid #e4f0f8;margin-top:4px;padding-top:4px">
      <span>Toplam Puan</span><span class="tv">${total.toFixed(2)}</span></div>
    ${delta!==null&&yr!==YEARS.find(y=>DATA[uid].yr[y])?`<div class="tr"><span>İlk yıldan değişim</span><span class="${vc}">${delta>=0?'+':''}${delta.toFixed(2)}</span></div>`:''}
    `:'<div style="color:#bbb;font-size:10px">Bu yıl için veri yok</div>'}`;

  tip.style.display='block';
  const margin=14;
  let l=ev.clientX+margin, t=ev.clientY-10;
  const tw=220, th=180;
  if(l+tw>window.innerWidth-4) l=ev.clientX-tw-margin;
  if(t+th>window.innerHeight-4) t=ev.clientY-th-10;
  tip.style.left=l+'px'; tip.style.top=t+'px';
}

function drawColorBar(mn,mx){
  const canvas=document.getElementById('cbar');
  const ctx=canvas.getContext('2d');
  const w=canvas.width, h=canvas.height;
  for(let i=0;i<w;i++){
    const t=i/w;
    ctx.fillStyle=curMode==='delta'?colourDelta(t):colourTotal(t);
    ctx.fillRect(i,0,1,h);
  }
}

function setMode(m){
  curMode=m;
  document.querySelectorAll('.mbtn').forEach(b=>{
    b.classList.toggle('on',b.getAttribute('onclick')===`setMode('${m}')`);
  });
  draw();
}

function setSort(v){curSort=v;draw();}

window.setMode=setMode;
window.setSort=setSort;
window.addEventListener('DOMContentLoaded',draw);
window.addEventListener('resize',draw);
</script>
</body>
</html>
