<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;font-family:'Open Sans',sans-serif}
#wrap{background:#fff;padding:24px 22px 18px;border:1px solid #d4e2ec;border-radius:8px;width:100%;max-width:1180px;box-shadow:0 4px 24px rgba(0,40,80,0.08)}

/* HEADER */
#head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:6px}
#ttl{font-size:18px;font-weight:700;color:#1a3a52;letter-spacing:-0.2px;line-height:1.3}
#sub{font-size:10.5px;color:#8ab0c8;margin-top:3px}
#src{font-size:9.5px;color:#8ab0c8;text-align:right;line-height:1.7}

/* FACULTY FILTER */
#facfilter{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 10px}
.facbtn{padding:5px 12px;border:1.5px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:10px;font-weight:600;color:#888;font-family:'Open Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.facbtn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.facbtn.on{color:#fff}
.facbtn.dim{opacity:0.35}
#allbtn{padding:5px 12px;border:1.5px solid #1a3a52;border-radius:20px;background:#1a3a52;color:#fff;cursor:pointer;font-size:10px;font-weight:700;font-family:'Open Sans',sans-serif}

/* CHART */
#chartbox{position:relative;width:100%;background:#fff}
svg#gs{display:block;width:100%}
.blab{font-family:'Open Sans',sans-serif;pointer-events:none}

/* CONTROLS */
#ctrl{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
#pbtn{width:36px;height:36px;border-radius:50%;border:2px solid #1a3a52;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#pbtn:hover{background:#eef2f6}
#pbtn svg{width:12px;height:12px;fill:#1a3a52}
#tlwrap{flex:1;min-width:180px}
#tl{height:5px;background:#e4e8ec;border-radius:3px;cursor:pointer}
#tlf{height:100%;background:#1a3a52;border-radius:3px;width:0%;transition:width .05s}
.ticks{display:flex;justify-content:space-between;margin-top:6px}
.tick{font-size:11px;color:#aab;cursor:pointer;padding:2px 6px;border-radius:4px;user-select:none;font-weight:600;transition:color .15s}
.tick.on{color:#1a3a52}
.tick:hover{color:#1a3a52}

/* TOOLTIP */
#tt{position:fixed;background:#fff;border:1px solid #c0d0dc;border-radius:8px;padding:10px 14px;font-size:11px;line-height:1.85;pointer-events:none;display:none;z-index:999;color:#3a5060;min-width:190px;box-shadow:0 4px 16px rgba(0,30,60,0.14)}
#tt strong{color:#1a3a52;font-size:12.5px;display:block;margin-bottom:2px}
#tt .tc{font-size:9px;color:#aab;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.tr{display:flex;justify-content:space-between;gap:16px}
.tv{font-weight:700;color:#1a5a8c}
</style>

const NS='http://www.w3.org/2000/svg';

/* ── LAYOUT ── */
const PAD={t:36,r:160,b:54,l:50};
const XD=[0,100], YD=[0,100];
let W,H,svg;
let activeFacs=new Set(FACULTIES); // all on by default

function xp(v){return PAD.l+(v-XD[0])/(XD[1]-XD[0])*(W-PAD.l-PAD.r);}
function yp(v){return H-PAD.b-(v-YD[0])/(YD[1]-YD[0])*(H-PAD.t-PAD.b);}

/* bubble radius: sqrt scale on işbirliği score (0-100ish) */
function rs(isb){
  const mn=0,mx=80;
  const t=Math.max(0,Math.min(1,(isb-mn)/(mx-mn)));
  return 4+Math.sqrt(t)*22;
}
function lfs(r){return Math.max(7.5,Math.min(11.5,r*0.42+6));}

function lerp(a,b,t){return a+(b-a)*t;}
function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function mk(tag,a={}){const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;}

function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function lighten(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lr=Math.min(255,Math.round(r+(255-r)*amt));
  const lg=Math.min(255,Math.round(g+(255-g)*amt));
  const lb=Math.min(255,Math.round(b+(255-b)*amt));
  return `rgb(${lr},${lg},${lb})`;
}

function init(){
  const wrap=document.getElementById('chartbox');
  W=wrap.offsetWidth||900; H=Math.round(W*0.78);

    const dot=mk('circle',{cx:lx0+6,cy:ly,r:6,fill:FAC_COLORS[fac],opacity:'0.85'});
    leg.appendChild(dot);
    const t=mk('text',{x:lx0+18,y:ly,'dominant-baseline':'middle',
      'font-size':'9','font-family':"'Open Sans',sans-serif",fill:'#445'});
    t.textContent=fac.replace(' FAKÜLTESİ',''); leg.appendChild(t);
  });
  // size legend
  const szY=PAD.t+10+FACULTIES.length*22+24;
  const szT=mk('text',{x:lx0,y:szY,'font-size':'9','font-weight':'700',
    'font-family':"'Open Sans',sans-serif",fill:'#445'});
  szT.textContent='Araştırma İşbirliği'; leg.appendChild(szT);
  [10,40,70].forEach((v,i)=>{
    const r=rs(v);
    const cy=szY+22+i*26;
    leg.appendChild(mk('circle',{cx:lx0+14,cy,r,fill:'none',stroke:'#999','stroke-width':'1'}));
    const t=mk('text',{x:lx0+38,y:cy,'dominant-baseline':'middle','font-size':'9',
      'font-family':"'Open Sans',sans-serif",fill:'#778'});
    t.textContent=v; leg.appendChild(t);
  });
  svg.appendChild(leg);
}

/* ── RENDER FRAME ── */
function frame(fy,ty,t){
  document.getElementById('gwm').textContent=ty;
  document.getElementById('yrdisp').textContent=ty;

  const fromS=SCORES[String(fy)]||{}, toS=SCORES[String(ty)]||{};

  const pts=DEPTS.map(d=>{
    const f=fromS[d.id], to=toS[d.id];
    if(!f && !to) return null; // never present in either year shown
    let alpha=1;
    let useF=f, useTo=to;
    if(f && !to){ // disappears after fy: fade out
      useTo=f; alpha=1-ease(t);
    } else if(!f && to){ // appears at ty: fade in
      useF=to; alpha=ease(t);
    }
    return {
      id:d.id, s:d.s, fac:d.f, alpha,
      cx:lerp(useF[0],useTo[0],t),
      cy:lerp(useF[1],useTo[1],t),
      rv:lerp(useF[2],useTo[2],t),
    };
  }).filter(p=>p && p.alpha>0.04 && activeFacs.has(p.fac))
    .sort((a,b)=>b.rv-a.rv);

  const gb=document.getElementById('gb'), gl=document.getElementById('gl');
  gb.innerHTML=''; gl.innerHTML='';

  pts.forEach(p=>{
    const cx=xp(p.cx), cy=yp(p.cy), r=rs(p.rv);
    const col=FAC_COLORS[p.fac]||'#888';
    const gid='rg_'+p.fac.replace(/[^a-zA-Z0-9]/g,'_');

    const c=mk('circle',{cx,cy,r,fill:`url(#${gid})`,stroke:col,'stroke-width':'1','opacity':(0.88*p.alpha).toFixed(3)});
    c.style.cursor='pointer';
    c.addEventListener('mouseenter',ev=>{c.setAttribute('stroke-width','2.2');showTip(ev,p,ty);});
    c.addEventListener('mouseleave',()=>{c.setAttribute('stroke-width','1');document.getElementById('tt').style.display='none';});
    c.addEventListener('mousemove',ev=>showTip(ev,p,ty));
    gb.appendChild(c);

    /* label outside, leader line, font size scaled by bubble */
    const fs=lfs(r);
    const lbl=p.s;
    let lx=cx, ly=cy-r-5, anchor='middle';
    if(ly-fs<yp(100)+4) ly=cy+r+fs+3;
    const approxW=lbl.length*fs*0.50;
    if(lx-approxW/2<PAD.l+2) anchor='start';
    if(lx+approxW/2>W-PAD.r-2) anchor='end';

    const lineY2=ly>cy?cy+r:cy-r;
    gl.appendChild(mk('line',{x1:cx,y1:ly+(ly>cy?-2:2),x2:cx,y2:lineY2+(ly>cy?3:-3),
      stroke:col,'stroke-width':'0.6','stroke-dasharray':'2 2',opacity:(0.4*p.alpha).toFixed(3)}));

    const txt=mk('text',{x:lx,y:ly,'text-anchor':anchor,'dominant-baseline':'auto',
      class:'blab','font-size':fs,'font-weight':r>=14?'600':'400',
      fill:col,opacity:p.alpha.toFixed(3)});
    txt.textContent=lbl; gl.appendChild(txt);
  });
}

const FULL_BY_ID={};
DEPTS.forEach(d=>{FULL_BY_ID[d.id]=d.id.replace(/^(.*)$/,m=>m);});

function showTip(ev,p,yr){
  const tip=document.getElementById('tt');
  const fullName=p.id.charAt(0)+p.id.slice(1).toLowerCase();
  tip.innerHTML=`<strong>${p.id}</strong><span class="tc">${p.fac.replace(' FAKÜLTESİ','')} · ${yr}</span>
    <div class="tr"><span>Kapasite</span><span class="tv">${p.cx.toFixed(2)}</span></div>
    <div class="tr"><span>Kalite</span><span class="tv">${p.cy.toFixed(2)}</span></div>
    <div class="tr"><span>İşbirliği</span><span class="tv">${p.rv.toFixed(2)}</span></div>`;
  tip.style.display='block';
  let l=ev.clientX+14, t=ev.clientY-10;
  if(l+200>window.innerWidth-4) l=ev.clientX-210;
  if(t+110>window.innerHeight-4) t=ev.clientY-115;
  tip.style.left=l+'px'; tip.style.top=t+'px';
}

/* ── FACULTY FILTER UI ── */
function buildFacFilter(){
  const c=document.getElementById('facfilter');
  c.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.id='allbtn'; allBtn.textContent='Tümü';
  allBtn.onclick=()=>{activeFacs=new Set(FACULTIES);renderFacButtons();renderAll(curIdx,1);};
  c.appendChild(allBtn);

  FACULTIES.forEach(fac=>{
    const btn=document.createElement('button');
    btn.className='facbtn';
    btn.dataset.fac=fac;
    btn.innerHTML=`<span class="dot" style="background:${FAC_COLORS[fac]}"></span>${fac.replace(' FAKÜLTESİ','')}`;
    btn.onclick=()=>{
      if(activeFacs.has(fac) && activeFacs.size===1){
        activeFacs=new Set(FACULTIES);
      } else if(activeFacs.size===FACULTIES.length){
        activeFacs=new Set([fac]);
      } else if(activeFacs.has(fac)){
        activeFacs.delete(fac);
      } else {
        activeFacs.add(fac);
      }
      renderFacButtons();
      renderAll(curIdx,1);
    };
    c.appendChild(btn);
  });
  renderFacButtons();
}
function renderFacButtons(){
  document.querySelectorAll('.facbtn').forEach(b=>{
    const fac=b.dataset.fac;
    const on=activeFacs.has(fac);
    b.classList.toggle('on',on && activeFacs.size<FACULTIES.length);
    b.classList.toggle('dim',!on);
    b.style.background=on?FAC_COLORS[fac]:'#fff';
    b.style.borderColor=FAC_COLORS[fac];
    b.style.color=on?'#fff':'#888';
  });
}

/* ── ANIMATION ── */
let curIdx=0, playing=false, af=null, as2=null;
const DUR=1700;

function renderAll(i,t=1){
  curIdx=i;
  const fy=i===0?YEARS[0]:YEARS[i-1];
  frame(fy,YEARS[i],t);
  document.getElementById('tlf').style.width=((i/(YEARS.length-1))*100)+'%';
  document.querySelectorAll('.tick').forEach((e,j)=>e.classList.toggle('on',j===i));
}

window.gJump=i=>{stop2();renderAll(i,1);};
window.gSeek=ev=>{
  const tl=document.getElementById('tl');
  const br=tl.getBoundingClientRect();
  const t=Math.max(0,Math.min(1,(ev.clientX-br.left)/br.width));
  const raw=t*(YEARS.length-1);
  const i=Math.min(Math.floor(raw),YEARS.length-2);
  const frac=raw-i;
  stop2(); curIdx=i+(frac>.5?1:0);
  frame(YEARS[i],YEARS[Math.min(i+1,YEARS.length-1)],frac);
  document.getElementById('tlf').style.width=(t*100)+'%';
  document.querySelectorAll('.tick').forEach((e,j)=>e.classList.toggle('on',j===curIdx));
};
window.gPlay=()=>{
  if(playing){stop2();return;}
  if(curIdx>=YEARS.length-1)curIdx=0;
  playing=true;
  document.getElementById('ppath').setAttribute('d','M3 2h2v8H3zM7 2h2v8H7z');
  next2();
};
function stop2(){
  playing=false;
  if(af){cancelAnimationFrame(af);af=null;}
  document.getElementById('ppath').setAttribute('d','M2 1.5l9 4.5-9 4.5z');
}
function next2(){
  if(!playing)return;
  const ni=curIdx+1;
  if(ni>=YEARS.length){stop2();renderAll(YEARS.length-1,1);return;}
  const fy=YEARS[curIdx]; as2=null;
  document.querySelectorAll('.tick').forEach((e,j)=>e.classList.toggle('on',j===ni));
  function step(ts){
    if(!playing)return;
    if(!as2)as2=ts;
    const raw=Math.min((ts-as2)/DUR,1);
    const t=ease(raw);
    curIdx=ni;
    document.getElementById('tlf').style.width=(((ni-1+raw)/(YEARS.length-1))*100)+'%';
    frame(fy,YEARS[ni],t);
    if(raw<1){af=requestAnimationFrame(step);}
    else{setTimeout(()=>{if(playing&&ni<YEARS.length-1)next2();else stop2();},1000);}
  }
  af=requestAnimationFrame(step);
}

window.addEventListener('DOMContentLoaded',()=>{
  buildFacFilter();
  init();
  renderAll(0,1);
});
window.addEventListener('resize',()=>{
  init();
  renderAll(curIdx,1);
});
</script>
